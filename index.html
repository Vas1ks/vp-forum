<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ВП | Выживание с Подписчиками — Форум проекта</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(circle at 20% 30%, #0e2a1a, #051007);
      color: #eef5ec;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Текстура блоков (лёгкая) */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: repeating-linear-gradient(45deg, rgba(70, 100, 55, 0.08) 0px, rgba(70, 100, 55, 0.08) 2px, transparent 2px, transparent 12px);
      pointer-events: none;
      z-index: 0;
    }

    .header, .container, footer {
      position: relative;
      z-index: 2;
    }

    /* Шапка */
    .header {
      background: rgba(10, 22, 12, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #528a3e;
      padding: 16px 0;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px;
      flex: 1;
    }

    .header-content {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    .logo h1 {
      font-size: 26px;
      background: linear-gradient(135deg, #c8ffb0, #76b35c);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .logo p {
      font-size: 12px;
      color: #98bf82;
    }

    .nav a {
      color: #e0f5d6;
      text-decoration: none;
      margin-left: 28px;
      font-weight: 500;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
    }

    .nav a:hover {
      color: #b5ff96;
      border-bottom: 1px solid #7dba5e;
    }

    /* Статистика */
    .stats {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin: 35px 0 30px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: rgba(30, 50, 28, 0.7);
      backdrop-filter: blur(6px);
      border-radius: 40px;
      padding: 14px 28px;
      text-align: center;
      border: 1px solid #517e41;
      min-width: 120px;
    }

    .stat-number {
      font-size: 34px;
      font-weight: 800;
      color: #caffb0;
    }

    .stat-label {
      font-size: 13px;
      color: #b8daa6;
      margin-top: 6px;
    }

    /* Категория */
    .category-title {
      margin: 40px 0 14px 8px;
      font-size: 20px;
      font-weight: 600;
      border-left: 4px solid #6baa4a;
      padding-left: 16px;
    }

    /* Карточка темы */
    .topic-row {
      background: rgba(20, 32, 20, 0.7);
      backdrop-filter: blur(4px);
      border-radius: 22px;
      padding: 16px 22px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: 0.2s;
      border: 1px solid #457037;
    }

    .topic-row:hover {
      background: rgba(45, 70, 42, 0.8);
      transform: translateX(5px);
      border-color: #79b85e;
    }

    .topic-title {
      font-size: 17px;
      font-weight: 600;
      color: #e3ffd1;
      cursor: pointer;
    }

    .topic-meta {
      font-size: 12px;
      color: #9bbc89;
      margin-top: 6px;
    }

    .topic-stats {
      background: #1c3018;
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 13px;
    }

    /* Кнопки */
    .btn {
      background: #468c34;
      border: none;
      color: white;
      font-weight: 600;
      padding: 10px 24px;
      border-radius: 40px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s;
      margin: 20px 0 20px;
      display: inline-block;
    }

    .btn:hover {
      background: #5fab46;
      transform: scale(0.97);
    }

    /* Карточка одной темы */
    .topic-card {
      background: rgba(18, 30, 18, 0.9);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 28px;
      margin: 20px 0;
      border: 1px solid #588a46;
    }

    /* Комментарии */
    .comment {
      background: #1f2f1c;
      border-radius: 20px;
      padding: 14px 18px;
      margin-bottom: 14px;
      border-left: 4px solid #74b059;
    }

    .reply-form {
      background: #132011;
      border-radius: 24px;
      padding: 20px;
      margin-top: 28px;
    }

    input, textarea, select {
      background: #1f321c;
      border: 1px solid #54833e;
      color: #f0ffea;
      border-radius: 30px;
      padding: 12px 18px;
      width: 100%;
      margin-bottom: 14px;
      font-family: inherit;
    }

    footer {
      text-align: center;
      padding: 28px 0;
      margin-top: 50px;
      border-top: 1px solid #2f5228;
      color: #8bb37a;
      font-size: 13px;
    }

    .back-link {
      color: #c2f0a8;
      cursor: pointer;
      margin-bottom: 20px;
      display: inline-block;
    }

    @media (max-width: 700px) {
      .header-content { flex-direction: column; text-align: center; }
      .topic-row { flex-direction: column; align-items: flex-start; gap: 10px; }
      .stats { gap: 12px; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-content">
    <div class="logo">
      <h1>🌿 ВП | Выживание с Подписчиками</h1>
      <p>официальный форум проекта</p>
    </div>
    <div class="nav">
      <a onclick="showMainPage()">Главная</a>
      <a onclick="showCreateTopicForm()">Создать тему</a>
      <a href="#">Правила</a>
    </div>
  </div>
</div>

<div class="container" id="app">
  <div style="text-align:center; padding:60px;">📡 загрузка форума...</div>
</div>

<footer>
  © 2026 ВП | Выживание с Подписчиками — Форум проекта
</footer>

<script>
  // ================ ВАШИ ССЫЛКИ (НЕ МЕНЯЙТЕ, ОНИ РАБОЧИЕ) =================
  const TOPICS_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vST0Y9NxgyjLMkYCFNUsdgEU6SIW9COeKHkXj_hMzZ82o1IavIQe2TFfh-png4OXskm9XJNnH4n_Dom/pub?gid=0&single=true&output=csv";
  const COMMENTS_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vST0Y9NxgyjLMkYCFNUsdgEU6SIW9COeKHkXj_hMzZ82o1IavIQe2TFfh-png4OXskm9XJNnH4n_Dom/pub?gid=1157264192&single=true&output=csv";
  const ADD_COMMENT_API = "https://script.google.com/macros/s/AKfycbzxnUFg_5XYX1-vZ6XFAG7A4j1yJGnHE27cLyle0oi5vk16mUQ8SA9QIUbvxQJ9D0Eq/exec";
  const ADD_TOPIC_API = "https://script.google.com/macros/s/AKfycbzcws06pWqn5TZkYDNbNw_m3z-xDlUfa1Ih4nywKdo8BDCBYdLJn0LmyjnwJM7uY6lk/exec";
  // =================================================================

  let topics = [], comments = [];

  async function loadData() {
    try {
      const [topicsRes, commentsRes] = await Promise.all([fetch(TOPICS_CSV), fetch(COMMENTS_CSV)]);
      const topicsText = await topicsRes.text();
      const commentsText = await commentsRes.text();
      topics = parseCSV(topicsText);
      comments = parseCSV(commentsText);
      showMainPage();
    } catch(e) {
      document.getElementById('app').innerHTML = '<div style="padding:40px;text-align:center;">⚠️ ошибка загрузки. проверьте CSV ссылки в коде</div>';
      console.error(e);
    }
  }

  function parseCSV(text) {
    const rows = text.split('\n').filter(r => r.trim());
    if(rows.length < 2) return [];
    const headers = rows[0].split(',').map(h => h.trim().toLowerCase());
    const result = [];
    for(let i = 1; i < rows.length; i++) {
      const cols = rows[i].split(',');
      if(cols.length < 2) continue;
      let obj = {};
      headers.forEach((h, idx) => obj[h] = cols[idx] ? cols[idx].trim() : '');
      result.push(obj);
    }
    return result;
  }

  function showMainPage() {
    const categories = ["Общее", "Ивенты", "Постройки", "PvP", "Правила"];
    const totalTopics = topics.length;
    const totalComments = comments.length;
    const uniqueAuthors = new Set([...topics.map(t => t.author), ...comments.map(c => c.author)]);
    
    let html = `<div class="stats">
      <div class="stat-card"><div class="stat-number">${totalTopics}</div><div class="stat-label">тем</div></div>
      <div class="stat-card"><div class="stat-number">${totalComments}</div><div class="stat-label">сообщений</div></div>
      <div class="stat-card"><div class="stat-number">${uniqueAuthors.size}</div><div class="stat-label">авторов</div></div>
    </div>`;

    for(let cat of categories) {
      const filtered = topics.filter(t => t.category === cat);
      html += `<div class="category-title">📁 ${cat}</div>`;
      if(filtered.length === 0) {
        html += `<div class="topic-row" style="justify-content:center;">— пока нет тем —</div>`;
      } else {
        for(let t of filtered) {
          const commentCount = comments.filter(c => c.topic_id === t.id).length;
          html += `
            <div class="topic-row">
              <div>
                <div class="topic-title" onclick="showTopic('${t.id}')">${escapeHtml(t.title)}</div>
                <div class="topic-meta">автор: ${escapeHtml(t.author)} | ${t.date}</div>
              </div>
              <div class="topic-stats">💬 ${commentCount}</div>
            </div>
          `;
        }
      }
    }
    html += `<button class="btn" onclick="showCreateTopicForm()">+ создать тему</button>`;
    document.getElementById('app').innerHTML = html;
  }

  function showCreateTopicForm() {
    document.getElementById('app').innerHTML = `
      <div class="back-link" onclick="showMainPage()">← назад</div>
      <div class="topic-card">
        <h2>📝 новая тема</h2>
        <input id="newTitle" placeholder="название темы">
        <select id="newCategory">
          <option>Общее</option><option>Ивенты</option><option>Постройки</option><option>PvP</option><option>Правила</option>
        </select>
        <input id="newAuthor" placeholder="ваш игровой ник">
        <button class="btn" id="sendTopicBtn">📢 опубликовать</button>
      </div>
    `;
    document.getElementById('sendTopicBtn').onclick = createTopic;
  }

  async function createTopic() {
    const title = document.getElementById('newTitle').value.trim();
    const author = document.getElementById('newAuthor').value.trim();
    const category = document.getElementById('newCategory').value;
    if(!title || !author) return alert("заполните все поля");
    const date = new Date().toLocaleDateString();
    const btn = document.getElementById('sendTopicBtn');
    btn.disabled = true;
    try {
      await fetch(ADD_TOPIC_API, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ title, author, date, category }) });
      alert("✅ тема создана! обновите страницу (F5)");
      loadData();
    } catch(e) { alert("ошибка при создании темы"); }
    btn.disabled = false;
  }

  async function addComment(topicId) {
    const author = document.getElementById('replyAuthor').value.trim();
    const text = document.getElementById('replyText').value.trim();
    if(!author || !text) return alert("введите ник и текст");
    const date = new Date().toLocaleDateString();
    try {
      await fetch(ADD_COMMENT_API, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ topic_id: topicId, author, text, date }) });
      alert("✅ комментарий добавлен! обновите страницу");
      loadData().then(() => showTopic(topicId));
    } catch(e) { alert("ошибка при отправке комментария"); }
  }

  function showTopic(id) {
    const topic = topics.find(t => t.id === id);
    if(!topic) return;
    const topicComments = comments.filter(c => c.topic_id === id);
    let commentsHtml = topicComments.length ? topicComments.map(c => `
      <div class="comment">
        <div class="topic-meta" style="font-weight:bold; color:#c8ffb0;">${escapeHtml(c.author)}</div>
        <div style="margin:8px 0;">${escapeHtml(c.text)}</div>
        <div class="topic-meta">${c.date}</div>
      </div>
    `).join('') : '<div style="padding:14px;">пока ответов нет. будьте первым!</div>';
    
    const html = `
      <div class="back-link" onclick="showMainPage()">← к списку тем</div>
      <div class="topic-card">
        <h2>${escapeHtml(topic.title)}</h2>
        <div class="topic-meta">автор: ${escapeHtml(topic.author)} | ${topic.date} | категория: ${topic.category}</div>
        <div class="comments-section" style="margin-top: 28px;">
          <h3 style="margin-bottom: 12px;">💬 ответы (${topicComments.length})</h3>
          ${commentsHtml}
          <div class="reply-form">
            <h4>✏️ ваш ответ</h4>
            <input id="replyAuthor" placeholder="ваш ник">
            <textarea id="replyText" rows="2" placeholder="текст сообщения..."></textarea>
            <button class="btn" onclick="addComment('${id}')">отправить</button>
          </div>
        </div>
      </div>
    `;
    document.getElementById('app').innerHTML = html;
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>]/g, function(m) {
      if(m === '&') return '&amp;';
      if(m === '<') return '&lt;';
      if(m === '>') return '&gt;';
      return m;
    });
  }

  loadData();
</script>
</body>
</html>
