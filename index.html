<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ВП | Выживание с Подписчиками — Форум</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<div class="header">
  <div class="container header-inner">
    <div class="logo">
      <img src="images/logovp.png" alt="Логотип ВП" class="logo-img" onerror="this.onerror=null; this.src='https://via.placeholder.com/50?text=VP';">
      <div><h1>ВП | Выживание с Подписчиками</h1><p>официальный форум проекта</p></div>
    </div>
    <div class="nav">
      <a onclick="navigateToMain()">Главная</a>
      <a onclick="showCreateTopicForm()">Создать тему</a>
      <button class="theme-toggle" onclick="document.body.classList.toggle('dark-theme')">🌓 Тема</button>
      <button class="auth-btn" onclick="openAuth()">
        <i class="fas fa-user-circle"></i> 
        <span>Войти</span>
      </button>
    </div>
  </div>
</div>

<div class="main-wrapper">
  <div class="content-box" id="app"></div>
</div>

<footer>© 2026 ВП | Выживание с Подписчиками — Форум проекта</footer>

<!-- Модальное окно для авторизации -->
<div id="authModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000;">
  <div style="background:#fff; margin:10% auto; padding:30px; width:300px; border-radius:8px;">
    <button onclick="closeAuth()" style="float:right;">×</button>
    <h2>Вход / Регистрация</h2>
    <input id="authNick" placeholder="Ник" style="width:100%; margin:8px 0; padding:8px;"><br>
    <input id="authPassword" type="password" placeholder="Пароль" style="width:100%; margin:8px 0; padding:8px;"><br>
    <button onclick="login()">Войти</button>
    <button onclick="register()">Зарегистрироваться</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
