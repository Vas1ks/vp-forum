<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ВП | Выживание с Подписчиками — Форум</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #eef3ea;
      font-family: 'Inter', -apple-system, 'Segoe UI', Roboto, sans-serif;
      color: #1a2a1c;
      line-height: 1.4;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    
    /* Тёмная тема */
    body.dark-theme { background: #1a1e1c; color: #e0e0e0; }
    body.dark-theme .category-block,
    body.dark-theme .sidebar-card,
    body.dark-theme .thread-container,
    body.dark-theme .comment,
    body.dark-theme .reply-form,
    body.dark-theme .category-header { background: #2a2f2a; border-color: #3a4a3a; }
    body.dark-theme .category-link,
    body.dark-theme .topic-link { color: #ddd; border-bottom-color: #2a3a2a; }
    body.dark-theme .category-header h3,
    body.dark-theme .sidebar-card h4 { color: #d0e6c0; }
    body.dark-theme .topic-stats { color: #a0c090; }
    body.dark-theme .btn-primary { background: #444; color: white; }
    body.dark-theme .btn-primary:hover { background: #555; }
    
    .container { max-width: 1400px; margin: 0 auto; padding: 0 24px; flex: 1; }
    
    /* ШАПКА */
    .header {
      background: #1f3b2c;
      border-bottom: 3px solid #b5dfa3;
      padding: 12px 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-img { height: 45px; width: auto; background: none; }
    .logo h1 { font-size: 26px; font-weight: 700; color: #f1ffe8; margin: 0; }
    .logo p { font-size: 12px; color: #c7e2b9; margin-top: 2px; }
    .nav { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
    .nav a, .theme-toggle { color: #edffe3; text-decoration: none; font-weight: 500; cursor: pointer; background: none; border: none; font-size: 15px; padding: 5px 0; }
    .nav a:hover, .theme-toggle:hover { color: white; border-bottom: 2px solid #b3e29d; }
    
    /* ОСНОВНОЙ КОНТЕНТ (блок команды теперь справа по центру) */
    .content-layout {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 40px;
      margin: 40px auto;
      flex-wrap: wrap;
    }
    .center-section {
      flex: 0 1 600px;
      min-width: 280px;
    }
    .right-side {
      flex: 0 0 240px;
    }
    
    .category-block { background: white; border-radius: 24px; margin-bottom: 24px; border: 1px solid #e6f0e2; overflow: hidden; width: 100%; }
    .category-header { background: #f6fbf3; padding: 14px 20px; border-bottom: 1px solid #e0ecda; }
    .category-header h3 { font-size: 18px; font-weight: 700; color: #1e582c; }
    .category-links, .topic-list { padding: 4px 0; }
    .category-link, .topic-link { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; border-bottom: 1px solid #f0f6ec; color: #2e6b3e; font-size: 15px; }
    .topic-link { cursor: pointer; }
    .topic-link:hover { background: #f9fef6; }
    .topic-stats { font-size: 13px; color: #7baa6b; }
    
    .sidebar-card { background: white; border-radius: 24px; padding: 18px; border: 1px solid #e0ecda; width: 100%; }
    .sidebar-card h4 { font-size: 16px; margin-bottom: 12px; color: #205e32; border-left: 4px solid #7dbd68; padding-left: 12px; }
    .user-online { padding: 6px 0; }
    
    /* ФУТЕР */
    footer {
      text-align: center;
      padding: 28px;
      background: #1f3b2c;
      border-top: 3px solid #b5dfa3;
      color: #eef5e8;
      font-weight: 500;
      margin-top: 50px;
    }
    
    /* Страница темы */
    .thread-container { background: white; border-radius: 28px; padding: 24px; margin: 24px 0; border: 1px solid #e3efdd; }
    .comment { background: #fafef7; border-radius: 20px; padding: 16px; margin-bottom: 16px; border-left: 4px solid #9ad685; }
    .comment-photo { max-width: 100%; margin-top: 10px; border-radius: 16px; max-height: 260px; }
    .reply-form { background: #f4faf0; border-radius: 24px; padding: 20px; margin-top: 28px; }
    .reply-form textarea { width: 100%; border: 1px solid #d0e2c8; border-radius: 20px; padding: 12px 16px; font-family: inherit; resize: vertical; background: white; }
    .image-upload-area { display: flex; align-items: center; gap: 12px; margin: 14px 0; flex-wrap: wrap; }
    .image-preview { max-width: 80px; max-height: 80px; border-radius: 14px; border: 1px solid #cce0c2; }
    .btn-icon { background: #eef6ea; border: 1px solid #cde0c4; padding: 6px 14px; border-radius: 40px; cursor: pointer; font-size: 12px; display: inline-flex; align-items: center; gap: 6px; color: #2c6b3e; }
    .back-link { display: inline-flex; align-items: center; gap: 8px; color: #2d7845; cursor: pointer; margin-bottom: 20px; font-weight: 500; }
    .btn-primary { background: #2e7a45; border: none; color: white; font-weight: 600; padding: 10px 22px; border-radius: 40px; cursor: pointer; font-size: 14px; transition: 0.2s; }
    .btn-primary:hover { background: #1f5c34; transform: scale(0.97); }
    
    @media (max-width: 950px) {
      .content-layout { flex-direction: column; align-items: center; gap: 30px; }
      .right-side { width: 100%; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="container header-inner">
    <div class="logo">
      <img src="logovp.png" alt="Логотип ВП" class="logo-img" onerror="this.onerror=null; this.src='https://via.placeholder.com/45?text=VP';">
      <div><h1>ВП | Выживание с Подписчиками</h1><p>официальный форум проекта</p></div>
    </div>
    <div class="nav">
      <a onclick="showMainPage()">Главная</a>
      <a onclick="showCreateTopicForm()">Создать тему</a>
      <button class="theme-toggle" onclick="document.body.classList.toggle('dark-theme')">🌓 Тема</button>
    </div>
  </div>
</div>

<div class="container" id="app"><div style="text-align:center; padding:60px;">📡 загрузка...</div></div>
<footer>© 2026 ВП | Выживание с Подписчиками — Форум проекта</footer>

<script>
  const TOPICS_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR7w_qakiVZNa26pZXY9_-qZ2peGlKga-J3VlMfE8WtYt_skMjgYyiECDfOGzgxmDn7ZdyFJd_7q_CP/pub?output=csv";
  const COMMENTS_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRhLuXUXT8TU26BTL6j5ih5BlvNQ_RFweSK8yYHgycnK2bObZINPWi9pUUeNtE-5FNQYvmpihg-EWYV/pub?output=csv";
  const ADD_TOPIC_API = "https://script.google.com/macros/s/AKfycbzMqzTrs4Q51_PDGXsAD6-JxoXFkfLH3hwByYoc6fgv6zK08df6tvzYKaOVHy1buVn6Zw/exec";
  const ADD_COMMENT_API = "https://script.google.com/macros/s/AKfycbxiPAvFOVOGBXayfweiAUJAReTXYfFSvdKcVuiZv2i8O5qj2g04kjHUkJT7FsN2ga8/exec";

  let topics = [], comments = [];

  async function loadData() {
    try {
      const [tRes, cRes] = await Promise.all([fetch(TOPICS_CSV), fetch(COMMENTS_CSV)]);
      topics = parseCSV(await tRes.text());
      comments = parseCSV(await cRes.text());
      topics.sort((a,b) => (Number(b.id)||0) - (Number(a.id)||0));
      showMainPage();
    } catch(e) { document.getElementById('app').innerHTML = '<div style="padding:40px;text-align:center;">⚠️ Ошибка загрузки</div>'; }
  }

  function parseCSV(text) {
    const rows = text.split('\n').filter(r=>r.trim());
    if(rows.length<2) return [];
    const headers = rows[0].split(',').map(h=>h.trim().toLowerCase());
    return rows.slice(1).map(row=>{ let obj={}; headers.forEach((h,i)=>obj[h]=row.split(',')[i]?.trim()||''); return obj; }).filter(obj=>Object.keys(obj).length);
  }

  function showMainPage() {
    const mainLinks = [
      { name: "Новости и информация", link: "#" },
      { name: "Технический раздел", link: "#" },
      { name: "Мероприятия и ивенты", link: "#" },
      { name: "Предложения по улучшению проекта", link: "#" },
      { name: "Сообщество в Discord", link: "https://discord.gg/Fn6UecrNNM", external: true },
      { name: "История ВП", link: "#" }
    ];
    const topicCats = ["Общее", "Постройки"];
    
    let centerHtml = `<div class="center-section">
      <div class="category-block"><div class="category-header"><h3>Основной раздел</h3></div><div class="category-links">`;
    mainLinks.forEach(link => {
      if (link.external) {
        centerHtml += `<a href="${link.link}" target="_blank" class="category-link"><span><i class="fab fa-discord"></i> ${link.name}</span> <i class="fas fa-external-link-alt" style="font-size: 10px;"></i></a>`;
      } else {
        centerHtml += `<div class="category-link"><span><i class="far fa-folder"></i> ${link.name}</span></div>`;
      }
    });
    centerHtml += `</div></div>`;
    
    for(let cat of topicCats) {
      let filtered = topics.filter(t=>t.category===cat);
      centerHtml += `<div class="category-block"><div class="category-header"><h3>📁 ${cat}</h3></div>`;
      if(!filtered.length) centerHtml += `<div class="category-link">— нет тем —</div>`;
      else filtered.forEach(t=>{
        let cnt = comments.filter(c=>c.topic_id===t.id).length;
        centerHtml += `<div class="topic-link" onclick="showTopic('${t.id}')"><span><i class="far fa-comment"></i> ${escapeHtml(t.title)}</span><span class="topic-stats">💬 ${cnt}</span></div>`;
      });
      centerHtml += `</div>`;
    }
    centerHtml += `</div>`;
    
    let rightHtml = `<div class="right-side">
      <div class="sidebar-card"><h4><i class="fas fa-users"></i> Команда форума онлайн</h4>
        <div class="user-online"><b>Vas1ks</b><br><span style="font-size:12px;">Команда проекта</span></div>
      </div>
    </div>`;
    
    document.getElementById('app').innerHTML = `<div class="content-layout">${centerHtml}${rightHtml}</div>`;
  }

  function showCreateTopicForm() {
    document.getElementById('app').innerHTML = `<div class="back-link" onclick="showMainPage()">← назад</div>
      <div class="thread-container"><h2>📝 Новая тема</h2><input id="newTitle" placeholder="Название темы">
      <select id="newCategory"><option>Общее</option><option>Постройки</option></select>
      <input id="newAuthor" placeholder="Ваш игровой ник"><button class="btn-primary" id="sendTopicBtn">📢 Опубликовать</button></div>`;
    document.getElementById('sendTopicBtn').onclick = createTopic;
  }

  async function createTopic() {
    let title = document.getElementById('newTitle').value.trim(), author = document.getElementById('newAuthor').value.trim(), category = document.getElementById('newCategory').value;
    if(!title||!author) return alert("Заполните поля");
    localStorage.setItem('vp_nick', author);
    let date = new Date().toLocaleDateString();
    let btn = document.getElementById('sendTopicBtn');
    btn.disabled = true;
    try { await fetch(ADD_TOPIC_API, { method:'POST', mode:'no-cors', body: JSON.stringify({ title, author, date, category }) }); alert("✅ Тема создана! Обновите страницу"); loadData(); } catch(e){ alert("Ошибка"); }
    btn.disabled = false;
  }

  let pendingImage = null;
  window.triggerImageUpload = ()=> {
    let inp = document.createElement('input');
    inp.type = 'file';
    inp.accept = 'image/*';
    inp.onchange = e=>{
      let file = e.target.files[0];
      if(!file) return;
      let reader = new FileReader();
      reader.onload = ev=>{ pendingImage = ev.target.result; let div = document.getElementById('imagePreview'); if(div) div.innerHTML = `<img src="${pendingImage}" class="image-preview"> <span>✓ фото</span>`; };
      reader.readAsDataURL(file);
    };
    inp.click();
  };

  window.addCommentWithImage = async (topicId)=>{
    let author = document.getElementById('replyAuthor').value.trim();
    let text = document.getElementById('replyText').value.trim();
    if(!author || (!text && !pendingImage)) return alert("Введите ник и текст или фото");
    let date = new Date().toLocaleDateString();
    let finalText = text;
    if(pendingImage) finalText = (finalText?finalText+"\n":"") + "[IMG]"+pendingImage+"[/IMG]";
    try {
      await fetch(ADD_COMMENT_API, { method:'POST', mode:'no-cors', body: JSON.stringify({ topic_id: topicId, author, text: finalText, date }) });
      alert("✅ Комментарий добавлен! Обновите страницу");
      loadData().then(()=>showTopic(topicId));
    } catch(e){ alert("Ошибка"); }
    pendingImage = null;
  };

  function showTopic(id){
    let topic = topics.find(t=>t.id===id);
    if(!topic) return;
    let topicComments = comments.filter(c=>c.topic_id===id);
    let commentsHtml = !topicComments.length ? '<div>— нет ответов —</div>' : topicComments.map(c=>{
      let txt = c.text, imgHtml = '';
      let m = txt.match(/\[IMG\](.*?)\[\/IMG\]/);
      if(m){ imgHtml = `<div><img src="${m[1]}" class="comment-photo"></div>`; txt = txt.replace(/\[IMG\].*?\[\/IMG\]/,'').trim(); }
      return `<div class="comment"><div style="font-weight:600;">${escapeHtml(c.author)}</div><div>${escapeHtml(txt)}</div>${imgHtml}<div style="font-size:11px;">${c.date}</div></div>`;
    }).join('');
    document.getElementById('app').innerHTML = `<div class="back-link" onclick="showMainPage()">← к списку тем</div>
      <div class="thread-container"><h2>${escapeHtml(topic.title)}</h2><div>автор: ${escapeHtml(topic.author)} | ${topic.date} | ${topic.category}</div>
      <div style="margin-top:28px;"><h3>💬 Ответы (${topicComments.length})</h3>${commentsHtml}
      <div class="reply-form"><h4>✏️ Ваш ответ</h4><input id="replyAuthor" placeholder="Ваш ник"><textarea id="replyText" rows="2"></textarea>
      <div class="image-upload-area"><button type="button" class="btn-icon" onclick="triggerImageUpload()"><i class="fas fa-camera"></i> Прикрепить фото</button><div id="imagePreview"></div></div>
      <button class="btn-primary" onclick="addCommentWithImage('${id}')">Отправить</button></div></div></div>`;
  }

  function escapeHtml(str){ return String(str).replace(/[&<>]/g, m=> m==='&'? '&amp;' : m==='<'? '&lt;' : '&gt;'); }
  loadData();
</script>
</body>
</html>
