<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ВП | Выживание с Подписчиками — Форум проекта</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: radial-gradient(circle at 10% 20%, #0b1a12, #07100b);
      color: #eef5ec;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Лёгкая текстура блоков поверх фона */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: repeating-linear-gradient(45deg, rgba(70, 90, 60, 0.08) 0px, rgba(70, 90, 60, 0.08) 2px, transparent 2px, transparent 12px);
      pointer-events: none;
      z-index: 0;
    }

    .container, .header, footer {
      position: relative;
      z-index: 2;
    }

    /* Шапка */
    .header {
      background: rgba(10, 20, 12, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(80, 130, 70, 0.6);
      padding: 16px 0;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px;
      flex: 1;
    }

    .header-content {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    .logo h1 {
      font-size: 26px;
      background: linear-gradient(135deg, #c6ffb0, #6f9e5f);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }

    .logo p {
      font-size: 12px;
      color: #9bbb8a;
    }

    .nav a {
      color: #d4ecd0;
      text-decoration: none;
      margin-left: 28px;
      font-weight: 500;
      font-size: 15px;
      transition: 0.2s;
      cursor: pointer;
    }

    .nav a:hover {
      color: #b3ff9b;
      border-bottom: 1px solid #7dba65;
    }

    /* Статистика (стеклянные карточки) */
    .stats {
      display: flex;
      gap: 24px;
      justify-content: center;
      margin: 40px 0 32px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: rgba(25, 40, 25, 0.65);
      backdrop-filter: blur(8px);
      border-radius: 36px;
      padding: 20px 32px;
      text-align: center;
      border: 1px solid rgba(100, 160, 80, 0.4);
      min-width: 130px;
      transition: 0.2s;
    }

    .stat-number {
      font-size: 38px;
      font-weight: 800;
      color: #bef5a6;
      line-height: 1;
    }

    .stat-label {
      font-size: 14px;
      color: #bcddae;
      margin-top: 8px;
    }

    /* Категории */
    .category-title {
      margin: 40px 0 16px 8px;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.2px;
      border-left: 4px solid #79b85e;
      padding-left: 16px;
    }

    /* Карточка темы */
    .topic-row {
      background: rgba(18, 28, 20, 0.7);
      backdrop-filter: blur(4px);
      border-radius: 24px;
      padding: 16px 24px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: 0.2s;
      border: 1px solid rgba(90, 140, 70, 0.3);
    }

    .topic-row:hover {
      background: rgba(35, 55, 35, 0.8);
      transform: translateX(4px);
      border-color: #6baa4e;
    }

    .topic-title {
      font-size: 18px;
      font-weight: 600;
      color: #deffcd;
      cursor: pointer;
      display: inline-block;
    }

    .topic-meta {
      font-size: 12px;
      color: #93b383;
      margin-top: 6px;
    }

    .topic-stats {
      font-size: 14px;
      background: #1e2e1c;
      padding: 6px 14px;
      border-radius: 60px;
    }

    /* Кнопка */
    .btn {
      background: #417c34;
      border: none;
      color: white;
      font-weight: 600;
      padding: 12px 28px;
      border-radius: 44px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      margin: 32px 0 24px;
      display: inline-block;
    }

    .btn:hover {
      background: #5d9e4a;
      transform: scale(0.98);
    }

    /* Карточка темы внутри */
    .topic-card {
      background: rgba(15, 25, 18, 0.85);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 28px;
      margin: 20px 0;
      border: 1px solid #4a7540;
    }

    .comment {
      background: #1d2a1b;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 14px;
      border-left: 4px solid #6dad51;
    }

    .reply-form {
      background: #121e10;
      border-radius: 24px;
      padding: 20px;
      margin-top: 24px;
    }

    input, textarea, select {
      background: #1c2b18;
      border: 1px solid #4c6e40;
      color: #f0ffea;
      border-radius: 28px;
      padding: 12px 18px;
      width: 100%;
      margin-bottom: 14px;
      font-family: inherit;
    }

    footer {
      text-align: center;
      padding: 28px 0;
      margin-top: 60px;
      border-top: 1px solid #2a4522;
      color: #8bae7a;
      font-size: 13px;
    }

    .back-link {
      color: #bbeea2;
      cursor: pointer;
      margin-bottom: 24px;
      display: inline-block;
    }

    @media (max-width: 700px) {
      .header-content { flex-direction: column; text-align: center; }
      .topic-row { flex-direction: column; gap: 12px; align-items: flex-start; }
      .stats { gap: 12px; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-content">
    <div class="logo">
      <h1>🌿 ВП | Выживание с Подписчиками</h1>
      <p>официальный форум проекта</p>
    </div>
    <div class="nav">
      <a onclick="showMainPage()">Главная</a>
      <a onclick="showCreateTopicForm()">Создать тему</a>
      <a href="#">Правила</a>
    </div>
  </div>
</div>

<div class="container" id="app">
  <div class="loading" style="text-align:center; padding:60px;">📡 загрузка форума...</div>
</div>

<footer>
  © 2026 ВП | Выживание с Подписчиками — Форум проекта
</footer>

<script>
  // ================ ⚙️ ТВОИ ССЫЛКИ =================
  const TOPICS_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vST0Y9NxgyjLMkYCFNUsdgEU6SIW9COeKHkXj_hMzZ82o1IavIQe2TFfh-png4OXskm9XJNnH4n_Dom/pub?gid=0&single=true&output=csv";
  const COMMENTS_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vST0Y9NxgyjLMkYCFNUsdgEU6SIW9COeKHkXj_hMzZ82o1IavIQe2TFfh-png4OXskm9XJNnH4n_Dom/pub?gid=1157264192&single=true&output=csv";
  const ADD_COMMENT_API = "https://script.google.com/macros/s/AKfycbzxnUFg_5XYX1-vZ6XFAG7A4j1yJGnHE27cLyle0oi5vk16mUQ8SA9QIUbvxQJ9D0Eq/exec";
  const ADD_TOPIC_API = "https://script.google.com/macros/s/AKfycbzcws06pWqn5TZkYDNbNw_m3z-xDlUfa1Ih4nywKdo8BDCBYdLJn0LmyjnwJM7uY6lk/exec";
  // =================================================

  let topics = [], comments = [];

  async function loadData() {
    try {
      const [topicsRes, commentsRes] = await Promise.all([fetch(TOPICS_CSV), fetch(COMMENTS_CSV)]);
      const topicsText = await topicsRes.text();
      const commentsText = await commentsRes.text();
      topics = parseCSV(topicsText);
      comments = parseCSV(commentsText);
      showMainPage();
    } catch(e) {
      document.getElementById('app').innerHTML = '<div style="padding:40px;text-align:center;">⚠️ ошибка загрузки. проверь CSV ссылки</div>';
    }
  }

  function parseCSV(text) {
    const rows = text.split('\n').filter(r => r.trim());
    if(rows.length<2) return [];
    const headers = rows[0].split(',').map(h=>h.trim().toLowerCase());
    let res = [];
    for(let i=1;i<rows.length;i++) {
      let cols = rows[i].split(',');
      if(cols.length<2) continue;
      let obj = {};
      headers.forEach((h,idx)=> obj[h]=cols[idx]?cols[idx].trim():'');
      res.push(obj);
    }
    return res;
  }

  function showMainPage() {
    const cats = ["Общее","Ивенты","Постройки","PvP","Правила"];
    const totalTopics = topics.length;
    const totalComments = comments.length;
    const authors = new Set([...topics.map(t=>t.author), ...comments.map(c=>c.author)]);
    let html = `<div class="stats">
      <div class="stat-card"><div class="stat-number">${totalTopics}</div><div class="stat-label">тем</div></div>
      <div class="stat-card"><div class="stat-number">${totalComments}</div><div class="stat-label">сообщений</div></div>
      <div class="stat-card"><div class="stat-number">${authors.size}</div><div class="stat-label">авторов</div></div>
    </div>`;

    for(let cat of cats) {
      let filtered = topics.filter(t=>t.category===cat);
      html += `<div class="category-title">📁 ${cat}</div>`;
      if(filtered.length===0) html+=`<div class="topic-row" style="justify-content:center;">— нет тем —</div>`;
      else for(let t of filtered) {
        let cnt = comments.filter(c=>c.topic_id===t.id).length;
        html += `<div class="topic-row">
          <div><div class="topic-title" onclick="showTopic('${t.id}')">${escapeHtml(t.title)}</div>
          <div class="topic-meta">автор: ${escapeHtml(t.author)} | ${t.date}</div></div>
          <div class="topic-stats">💬 ${cnt}</div>
        </div>`;
      }
    }
    html += `<button class="btn" onclick="showCreateTopicForm()">+ создать тему</button>`;
    document.getElementById('app').innerHTML = html;
  }

  function showCreateTopicForm() {
    document.getElementById('app').innerHTML = `
      <div class="back-link" onclick="showMainPage()">← назад</div>
      <div class="topic-card"><h2>📝 новая тема</h2>
      <input id="newTitle" placeholder="заголовок">
      <select id="newCategory"><option>Общее</option><option>Ивенты</option><option>Постройки</option><option>PvP</option><option>Правила</option></select>
      <input id="newAuthor" placeholder="ваш ник">
      <button class="btn" id="sendTopicBtn">📢 опубликовать</button></div>
    `;
    document.getElementById('sendTopicBtn').onclick = createTopic;
  }

  async function createTopic() {
    const title = document.getElementById('newTitle').value.trim();
    const author = document.getElementById('newAuthor').value.trim();
    const category = document.getElementById('newCategory').value;
    if(!title || !author) return alert("заполните ник и название");
    const date = new Date().toLocaleDateString();
    const btn = document.getElementById('sendTopicBtn');
    btn.disabled = true;
    try {
      await fetch(ADD_TOPIC_API, { method:'POST', mode:'no-cors', body: JSON.stringify({title,author,date,category}) });
      alert("✅ тема создана! обновите страницу (F5)");
      loadData();
    } catch(e) { alert("ошибка API тем"); }
    btn.disabled = false;
  }

  async function addComment(topicId) {
    const author = document.getElementById('replyAuthor').value.trim();
    const text = document.getElementById('replyText').value.trim();
    if(!author || !text) return alert("введите ник и текст");
    const date = new Date().toLocaleDateString();
    try {
      await fetch(ADD_COMMENT_API, { method:'POST', mode:'no-cors', body: JSON.stringify({topic_id:topicId, author, text, date}) });
      alert("✅ комментарий добавлен! обновите страницу");
      loadData().then(()=>showTopic(topicId));
    } catch(e) { alert("ошибка API комментариев"); }
  }

  function showTopic(id) {
    const topic = topics.find(t=>t.id===id);
    if(!topic) return;
    let coms = comments.filter(c=>c.topic_id===id);
    let comHtml = coms.length ? coms.map(c=>`<div class="comment"><div class="comment-author">${escapeHtml(c.author)}</div><div>${escapeHtml(c.text)}</div><div class="topic-meta">${c.date}</div></div>`).join('') : '<div style="padding:14px;">пока ответов нет</div>';
    document.getElementById('app').innerHTML = `
      <div class="back-link" onclick="showMainPage()">← к списку тем</div>
      <div class="topic-card"><h2>${escapeHtml(topic.title)}</h2><div class="topic-meta">автор: ${escapeHtml(topic.author)} | ${topic.date} | ${topic.category}</div>
      <div class="comments-section"><h3 style="margin:20px 0 12px;">💬 ответы (${coms.length})</h3>${comHtml}
      <div class="reply-form"><h4>✏️ ваш ответ</h4><input id="replyAuthor" placeholder="ник"><textarea id="replyText" rows="2"></textarea>
      <button class="btn" onclick="addComment('${id}')">отправить</button></div></div></div>
    `;
  }

  function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

  loadData();
</script>
</body>
</html>
