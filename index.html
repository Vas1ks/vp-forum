<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ВП | Выживание с Подписчиками — Форум проекта</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #eef3ea;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, 'Roboto', sans-serif;
      color: #1e2f1c;
      line-height: 1.4;
    }

    /* Контейнер */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ШАПКА КАК НА ПРИМЕРЕ */
    .header {
      background: #1f3b2a;
      border-bottom: 3px solid #bcddae;
      padding: 18px 0;
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .logo h1 {
      font-size: 28px;
      font-weight: 700;
      color: #ebffdf;
      letter-spacing: -0.3px;
    }

    .logo p {
      font-size: 13px;
      color: #c5e0b7;
      margin-top: 4px;
    }

    .nav a {
      color: #f1ffea;
      margin-left: 32px;
      text-decoration: none;
      font-weight: 500;
      font-size: 15px;
      transition: 0.2s;
      cursor: pointer;
    }

    .nav a:hover {
      color: #ffffff;
      border-bottom: 2px solid #b1e09b;
      padding-bottom: 4px;
    }

    /* СТАТИСТИКА (большие цифры как на GTA 5 RP) */
    .stats-row {
      display: flex;
      gap: 28px;
      justify-content: center;
      margin: 48px 0 40px;
      flex-wrap: wrap;
    }

    .stat-block {
      background: white;
      padding: 24px 40px;
      border-radius: 24px;
      text-align: center;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.02), 0 2px 4px rgba(0, 0, 0, 0.02);
      border: 1px solid #dce8d6;
      min-width: 160px;
    }

    .stat-number {
      font-size: 42px;
      font-weight: 800;
      color: #266e3a;
      line-height: 1;
    }

    .stat-label {
      font-size: 14px;
      color: #5d8156;
      margin-top: 10px;
      font-weight: 500;
    }

    /* КАТЕГОРИИ КАК НА ФОРУМЕ */
    .category-head {
      margin: 42px 0 18px 0;
      display: flex;
      justify-content: space-between;
      border-bottom: 2px solid #d3e7ca;
      padding-bottom: 8px;
    }

    .category-name {
      font-size: 22px;
      font-weight: 700;
      color: #235c2c;
    }

    .category-count {
      font-size: 13px;
      color: #7b9a71;
      background: #edf6e9;
      padding: 4px 12px;
      border-radius: 60px;
    }

    /* ТЕМЫ (карточки) */
    .topic-card-item {
      background: white;
      border-radius: 20px;
      padding: 16px 24px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: 0.2s;
      border: 1px solid #e3efdd;
      cursor: pointer;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
    }

    .topic-card-item:hover {
      background: #fefefc;
      border-color: #bfddb2;
      transform: translateX(5px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
    }

    .topic-title {
      font-size: 17px;
      font-weight: 650;
      color: #1d4728;
    }

    .topic-meta {
      font-size: 12px;
      color: #7f9e77;
      margin-top: 6px;
    }

    .topic-replies {
      background: #eff6eb;
      padding: 6px 16px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 600;
      color: #2b6a3b;
    }

    /* КНОПКИ */
    .btn-green {
      background: #2a7842;
      border: none;
      color: white;
      font-weight: 600;
      padding: 12px 32px;
      border-radius: 40px;
      cursor: pointer;
      font-size: 15px;
      transition: 0.2s;
      margin: 28px 0 20px;
      display: inline-block;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
    }

    .btn-green:hover {
      background: #1c5e32;
      transform: scale(0.97);
    }

    /* СТРАНИЦА ТЕМЫ + КОММЕНТАРИИ */
    .post-container {
      background: white;
      border-radius: 28px;
      padding: 32px;
      margin: 24px 0;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.02);
      border: 1px solid #e4efde;
    }

    .comment-item {
      background: #fafef7;
      border-radius: 20px;
      padding: 16px 20px;
      margin-bottom: 16px;
      border-left: 4px solid #85c06e;
    }

    .reply-area {
      background: #f4faf0;
      border-radius: 24px;
      padding: 22px;
      margin-top: 32px;
    }

    input, textarea, select {
      background: white;
      border: 1px solid #d0e2c8;
      border-radius: 32px;
      padding: 12px 18px;
      width: 100%;
      margin-bottom: 14px;
      font-family: inherit;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #66b34b;
      box-shadow: 0 0 0 3px rgba(70, 130, 70, 0.08);
    }

    /* ФУТЕР */
    footer {
      text-align: center;
      margin-top: 70px;
      padding: 28px;
      border-top: 1px solid #dcead6;
      color: #839f7a;
      font-size: 13px;
      background: #fafef8;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #2b7840;
      cursor: pointer;
      margin-bottom: 24px;
      font-weight: 500;
    }

    @media (max-width: 700px) {
      .container {
        padding: 0 18px;
      }
      .header-inner {
        flex-direction: column;
        gap: 12px;
        text-align: center;
      }
      .nav a {
        margin: 0 12px;
      }
      .topic-card-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }
      .stats-row {
        gap: 12px;
      }
      .stat-block {
        padding: 14px 20px;
        min-width: 100px;
      }
      .stat-number {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="container header-inner">
    <div class="logo">
      <h1>🌿 ВП | Выживание с Подписчиками</h1>
      <p>официальный форум проекта</p>
    </div>
    <div class="nav">
      <a onclick="showMainPage()">Главная</a>
      <a onclick="showCreateTopicForm()">Создать тему</a>
      <a href="#">Правила</a>
    </div>
  </div>
</div>

<div class="container" id="app">
  <div style="text-align:center; padding: 60px;">📡 загрузка форума...</div>
</div>

<footer>
  © 2026 ВП | Выживание с Подписчиками — Форум проекта
</footer>

<script>
  // === ТВОИ РАБОЧИЕ ССЫЛКИ (НЕ МЕНЯТЬ) ===
  const TOPICS_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR7w_qakiVZNa26pZXY9_-qZ2peGlKga-J3VlMfE8WtYt_skMjgYyiECDfOGzgxmDn7ZdyFJd_7q_CP/pub?output=csv";
  const COMMENTS_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRhLuXUXT8TU26BTL6j5ih5BlvNQ_RFweSK8yYHgycnK2bObZINPWi9pUUeNtE-5FNQYvmpihg-EWYV/pub?output=csv";
  const ADD_TOPIC_API = "https://script.google.com/macros/s/AKfycbzMqzTrs4Q51_PDGXsAD6-JxoXFkfLH3hwByYoc6fgv6zK08df6tvzYKaOVHy1buVn6Zw/exec";
  const ADD_COMMENT_API = "https://script.google.com/macros/s/AKfycbxiPAvFOVOGBXayfweiAUJAReTXYfFSvdKcVuiZv2i8O5qj2g04kjHUkJT7FsN2ga8/exec";
  // ========================================

  let topics = [], comments = [];

  async function loadData() {
    try {
      const [tRes, cRes] = await Promise.all([fetch(TOPICS_CSV), fetch(COMMENTS_CSV)]);
      topics = parseCSV(await tRes.text());
      comments = parseCSV(await cRes.text());
      showMainPage();
    } catch(e) {
      document.getElementById('app').innerHTML = '<div style="padding:40px;text-align:center;">⚠️ ошибка загрузки. проверь таблицы</div>';
    }
  }

  function parseCSV(text) {
    const rows = text.split('\n').filter(r => r.trim());
    if (rows.length < 2) return [];
    const headers = rows[0].split(',').map(h => h.trim().toLowerCase());
    return rows.slice(1).map(row => {
      const cols = row.split(',');
      let obj = {};
      headers.forEach((h, i) => obj[h] = cols[i] ? cols[i].trim() : '');
      return obj;
    }).filter(obj => Object.keys(obj).length);
  }

  function showMainPage() {
    const categories = ["Общее","Ивенты","Постройки","PvP","Правила"];
    const totalTopics = topics.length;
    const totalComments = comments.length;
    const uniqueAuthors = new Set([...topics.map(t=>t.author), ...comments.map(c=>c.author)]);
    
    let html = `<div class="stats-row">
      <div class="stat-block"><div class="stat-number">${totalTopics}</div><div class="stat-label">Темы</div></div>
      <div class="stat-block"><div class="stat-number">${totalComments}</div><div class="stat-label">Сообщения</div></div>
      <div class="stat-block"><div class="stat-number">${uniqueAuthors.size}</div><div class="stat-label">Авторы</div></div>
    </div>`;

    for (let cat of categories) {
      const filtered = topics.filter(t => t.category === cat);
      html += `<div class="category-head"><div class="category-name">📁 ${cat}</div><div class="category-count">${filtered.length} тем</div></div>`;
      if (!filtered.length) html += `<div class="topic-card-item" style="justify-content:center; cursor:default;">— нет тем —</div>`;
      else filtered.forEach(t => {
        const replyCount = comments.filter(c => c.topic_id === t.id).length;
        html += `<div class="topic-card-item" onclick="showTopic('${t.id}')">
          <div><div class="topic-title">${escapeHtml(t.title)}</div><div class="topic-meta">автор: ${escapeHtml(t.author)} | ${t.date}</div></div>
          <div class="topic-replies">💬 ${replyCount}</div>
        </div>`;
      });
    }
    html += `<button class="btn-green" onclick="showCreateTopicForm()">+ Создать тему</button>`;
    document.getElementById('app').innerHTML = html;
  }

  function showCreateTopicForm() {
    document.getElementById('app').innerHTML = `
      <div class="back-link" onclick="showMainPage()">← назад</div>
      <div class="post-container"><h2 style="margin-bottom:20px;">📝 Новая тема</h2>
      <input id="newTitle" placeholder="Название темы">
      <select id="newCategory"><option>Общее</option><option>Ивенты</option><option>Постройки</option><option>PvP</option><option>Правила</option></select>
      <input id="newAuthor" placeholder="Ваш игровой ник">
      <button class="btn-green" id="sendTopicBtn">📢 Опубликовать</button></div>
    `;
    document.getElementById('sendTopicBtn').onclick = createTopic;
  }

  async function createTopic() {
    const title = document.getElementById('newTitle').value.trim();
    const author = document.getElementById('newAuthor').value.trim();
    const category = document.getElementById('newCategory').value;
    if (!title || !author) return alert("Заполните поля");
    const date = new Date().toLocaleDateString();
    const btn = document.getElementById('sendTopicBtn');
    btn.disabled = true;
    try {
      await fetch(ADD_TOPIC_API, { method:'POST', mode:'no-cors', body: JSON.stringify({ title, author, date, category }) });
      alert("✅ Тема создана! Обновите страницу");
      loadData();
    } catch(e) { alert("Ошибка при создании темы"); }
    btn.disabled = false;
  }

  async function addComment(topicId) {
    const author = document.getElementById('replyAuthor').value.trim();
    const text = document.getElementById('replyText').value.trim();
    if (!author || !text) return alert("Введите ник и текст");
    const date = new Date().toLocaleDateString();
    try {
      await fetch(ADD_COMMENT_API, { method:'POST', mode:'no-cors', body: JSON.stringify({ topic_id: topicId, author, text, date }) });
      alert("✅ Комментарий добавлен! Обновите страницу");
      loadData().then(() => showTopic(topicId));
    } catch(e) { alert("Ошибка при отправке комментария"); }
  }

  function showTopic(id) {
    const topic = topics.find(t => t.id === id);
    if (!topic) return;
    const topicComments = comments.filter(c => c.topic_id === id);
    const commentsHtml = !topicComments.length ? '<div style="padding:14px;">пока ответов нет.</div>' :
      topicComments.map(c => `<div class="comment-item"><div style="font-weight:600; color:#266e3a;">${escapeHtml(c.author)}</div><div style="margin:8px 0;">${escapeHtml(c.text)}</div><div style="font-size:11px; color:#7f9e77;">${c.date}</div></div>`).join('');
    
    document.getElementById('app').innerHTML = `
      <div class="back-link" onclick="showMainPage()">← к списку тем</div>
      <div class="post-container"><h2>${escapeHtml(topic.title)}</h2><div class="topic-meta" style="margin-bottom:24px;">автор: ${escapeHtml(topic.author)} | ${topic.date} | ${topic.category}</div>
      <div><h3 style="margin-bottom:16px;">💬 Ответы (${topicComments.length})</h3>${commentsHtml}
      <div class="reply-area"><h4 style="margin-bottom:12px;">✏️ Ваш ответ</h4><input id="replyAuthor" placeholder="Ваш ник"><textarea id="replyText" rows="2"></textarea><button class="btn-green" onclick="addComment('${id}')">Отправить</button></div></div></div>
    `;
  }

  function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }
  loadData();
</script>
</body>
</html>
